name: Build MGL (iOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS arm64
    runs-on: macos-15          # Apple Silicon, Xcode 16, has both macOS + iPhoneOS SDKs

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System tools ────────────────────────────────────────────────────
      - name: Install build tools
        run: brew install cmake python3

      # ── 3. Resolve iOS SDK path ────────────────────────────────────────────
      - name: Resolve iOS SDK path
        id: sdk
        run: |
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          IOS_VER=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "path=$IOS_SDK"   >> "$GITHUB_OUTPUT"
          echo "version=$IOS_VER" >> "$GITHUB_OUTPUT"
          echo "iOS SDK: $IOS_SDK (version $IOS_VER)"

      # ── 4. Clone external dependencies ─────────────────────────────────────
      - name: Clone external dependencies
        run: |
          cd external
          bash clone_external.sh

      # ── 5. Cache external build artifacts ──────────────────────────────────
      - name: Get external SHAs for cache key
        id: ext_sha
        run: |
          SC=$(git -C external/SPIRV-Cross  rev-parse HEAD 2>/dev/null || echo none)
          ST=$(git -C external/SPIRV-Tools  rev-parse HEAD 2>/dev/null || echo none)
          SH=$(git -C external/SPIRV-Headers rev-parse HEAD 2>/dev/null || echo none)
          GL=$(git -C external/glslang       rev-parse HEAD 2>/dev/null || echo none)
          echo "key=${SC}-${ST}-${SH}-${GL}-${{ steps.sdk.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Cache external build artifacts
        id: cache_ext
        uses: actions/cache@v4
        with:
          path: |
            external/SPIRV-Cross/build
            external/SPIRV-Tools/build
            external/SPIRV-Headers/build
            external/glslang/build
          key: ext-ios-arm64-${{ steps.ext_sha.outputs.key }}

      # ── 6. Build external libs for iOS arm64 (skipped on cache hit) ────────
      # All external libs are compiled with iOS SDK + arm64 so they can be
      # linked into the final dylibs that run on iPhone.

      - name: Build SPIRV-Tools (iOS)
        if: steps.cache_ext.outputs.cache-hit != 'true'
        run: |
          cmake -S external/SPIRV-Tools -B external/SPIRV-Tools/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="${{ steps.sdk.outputs.path }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DSPIRV_SKIP_TESTS=ON \
            -DSPIRV_SKIP_EXECUTABLES=ON \
            -DSPIRV_WERROR=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build external/SPIRV-Tools/build --parallel $(sysctl -n hw.logicalcpu)

      - name: Build SPIRV-Headers (iOS)
        if: steps.cache_ext.outputs.cache-hit != 'true'
        run: |
          cmake -S external/SPIRV-Headers -B external/SPIRV-Headers/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="${{ steps.sdk.outputs.path }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build external/SPIRV-Headers/build --parallel $(sysctl -n hw.logicalcpu)

      - name: Build SPIRV-Cross (iOS)
        if: steps.cache_ext.outputs.cache-hit != 'true'
        run: |
          cmake -S external/SPIRV-Cross -B external/SPIRV-Cross/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="${{ steps.sdk.outputs.path }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DSPIRV_CROSS_STATIC=ON \
            -DSPIRV_CROSS_CLI=OFF \
            -DSPIRV_CROSS_ENABLE_TESTS=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build external/SPIRV-Cross/build --parallel $(sysctl -n hw.logicalcpu)

      - name: Build glslang (iOS)
        if: steps.cache_ext.outputs.cache-hit != 'true'
        run: |
          cd external/glslang
          python3 update_glslang_sources.py
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="${{ steps.sdk.outputs.path }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DENABLE_GLSLANG_BINARIES=OFF \
            -DENABLE_CTEST=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      # ── 7. Install mach compat shim ────────────────────────────────────────
      # <mach/mach_vm.h> and related headers are blocked on the iPhoneOS SDK
      # ("mach_vm.h unsupported").  We ship a shim header that re-declares only
      # the symbols MGL actually uses (vm_allocate, vm_deallocate, mach_task_self)
      # via libSystem externs, which ARE available on iOS at runtime.
      - name: Install mgl_mach_compat.h shim into MGL/src
        run: |
          cat > MGL/src/mgl_mach_compat.h << 'SHIM'
          /*
           * mgl_mach_compat.h — iOS-safe replacement for mach/mach_vm.h et al.
           * The iPhoneOS SDK blocks those headers but the kernel functions exist
           * in libSystem at runtime.  On macOS we fall through to the real headers.
           */
          #ifndef MGL_MACH_COMPAT_H
          #define MGL_MACH_COMPAT_H
          #include <stdint.h>
          #if TARGET_OS_IPHONE || TARGET_OS_SIMULATOR
          #  include <mach/kern_return.h>
          #  include <mach/port.h>
          typedef uintptr_t   vm_address_t;
          typedef uintptr_t   vm_size_t;
          typedef mach_port_t vm_map_t;
          #  ifndef VM_FLAGS_ANYWHERE
          #    define VM_FLAGS_ANYWHERE 1
          #  endif
          extern kern_return_t vm_allocate(vm_map_t, vm_address_t *, vm_size_t, int);
          extern kern_return_t vm_deallocate(vm_map_t, vm_address_t, vm_size_t);
          extern mach_port_t   mach_task_self(void);
          extern mach_port_t   mach_host_self(void);
          #else
          #  include <mach/mach_vm.h>
          #  include <mach/mach_init.h>
          #  include <mach/vm_map.h>
          #endif
          #endif /* MGL_MACH_COMPAT_H */
          SHIM

      # ── 8. Build libmgl.dylib + libmgl_es.dylib for iOS ────────────────────
      # Override the Makefile's macOS-specific variables:

      #   SDK_ROOT     -> iPhoneOS SDK  (not macosx)
      #   APPLE_CLANG  -> same clang, but now targeting iOS
      #   LIBS         -> drop Cocoa/IOKit (not present on iOS)
      #   CFLAGS extra -> -target arm64-apple-ios14.0 + min-version flag
      # We build only the "mgl" and "mgl_es" targets (no libglfw — iOS manages
      # its own windowing; PojavLauncher/Hynis does not need GLFW).
      - name: Build MGL for iOS
        run: |
          IOS_SDK="${{ steps.sdk.outputs.path }}"
          IOS_TARGET="arm64-apple-ios14.0"

          # Frameworks available on iOS (no Cocoa, no IOKit, no AppKit)
          IOS_FRAMEWORKS="-framework Metal -framework Foundation -framework CoreGraphics -framework QuartzCore -framework UIKit"

          make -j$(sysctl -n hw.logicalcpu) \
            SDK_ROOT="$IOS_SDK" \
            "CFLAGS=-Wall -gfull -O2 -arch arm64 -target $IOS_TARGET -isysroot $IOS_SDK \
              -IMGL/include -IMGL/include/GL -IMGL/SPIRV/SPIRV-Cross \
              -DENABLE_OPT=0 -DSPIRV_CROSS_C_API_MSL=1 -DSPIRV_CROSS_C_API_GLSL=1 \
              -DSPIRV_CROSS_C_API_CPP=1 -DSPIRV_CROSS_C_API_REFLECT=1 \
              -I./external/SPIRV-Cross \
              -I./external/SPIRV-Tools/include \
              -I./external/glslang/glslang/Include" \
            "LIBS=-arch arm64 -target $IOS_TARGET -isysroot $IOS_SDK \
              $IOS_FRAMEWORKS \
              -L./external/SPIRV-Cross/build -lspirv-cross-core -lspirv-cross-c \
              -lspirv-cross-cpp -lspirv-cross-msl -lspirv-cross-glsl \
              -lspirv-cross-hlsl -lspirv-cross-reflect \
              ./external/glslang/build/glslang/libglslang.a \
              ./external/glslang/build/glslang/libMachineIndependent.a \
              ./external/glslang/build/glslang/libGenericCodeGen.a \
              ./external/glslang/build/glslang/OSDependent/Unix/libOSDependent.a \
              ./external/glslang/build/glslang/libglslang-default-resource-limits.a \
              ./external/glslang/build/SPIRV/libSPIRV.a \
              ./external/SPIRV-Tools/build/source/libSPIRV-Tools.a \
              ./external/SPIRV-Tools/build/source/opt/libSPIRV-Tools-opt.a \
              ./external/SPIRV-Tools/build/source/link/libSPIRV-Tools-link.a \
              ./external/SPIRV-Tools/build/source/reduce/libSPIRV-Tools-reduce.a \
              ./external/SPIRV-Tools/build/source/diff/libSPIRV-Tools-diff.a \
              ./external/SPIRV-Tools/build/source/lint/libSPIRV-Tools-lint.a \
              -lc++" \
            build/libmgl.dylib build/libmgl_es.dylib

      # ── 8. Rename to match what PojavLauncher/Hynis expects ────────────────
      # The launcher sets RENDERER=libmgl_core.dylib and loads it via dlopen().
      # The Makefile output is build/libmgl.dylib — rename it so the assertion
      # in mgl_bridge.m (assert dl_handle) doesn't fire.
      - name: Rename output to libmgl_core.dylib
        run: |
          cp build/libmgl.dylib    build/libmgl_core.dylib
          cp build/libmgl_es.dylib build/libmgl_es_core.dylib

          # Fix install name so dlopen finds the right dylib at runtime
          install_name_tool -id @rpath/libmgl_core.dylib    build/libmgl_core.dylib
          install_name_tool -id @rpath/libmgl_es_core.dylib build/libmgl_es_core.dylib

      # ── 9. Verify outputs ──────────────────────────────────────────────────
      - name: Verify build outputs
        run: |
          echo "=== Files ==="
          ls -lh build/libmgl_core.dylib build/libmgl_es_core.dylib
          echo "=== Architecture (must be arm64) ==="
          lipo -info build/libmgl_core.dylib
          echo "=== Platform (must show iphoneos / ios) ==="
          vtool -show-build build/libmgl_core.dylib
          echo "=== Linked frameworks ==="
          otool -L build/libmgl_core.dylib

      # ── 10. Upload artifact ────────────────────────────────────────────────
      - name: Upload MGL iOS libraries
        uses: actions/upload-artifact@v4
        with:
          name: mgl-ios-arm64-${{ github.sha }}
          path: |
            build/libmgl_core.dylib
            build/libmgl_es_core.dylib
          retention-days: 30
          if-no-files-found: error
          
